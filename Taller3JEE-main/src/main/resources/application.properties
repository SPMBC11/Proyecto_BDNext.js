# Spring Boot Application Configuration
spring.application.name=taller3jee-ed
spring.application.display-name=Taller3JEE - Estructuras de Datos

# Server Configuration (8082: evita choque con Apache/httpd u otros en 8080)
server.port=8082
server.servlet.context-path=/taller3jee

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# H2 Database Configuration (Development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Batch Configuration
spring.batch.job.enabled=true
spring.batch.jdbc.initialize-database=always

# Logs Configuration
logging.level.root=INFO
logging.level.edu.ucol.taller3jee=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.batch=INFO
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/application.log

# Features
spring.devtools.restart.enabled=false

# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
